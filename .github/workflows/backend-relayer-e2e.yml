name: Backend Relayer E2E

on:
  push:
    branches: [main]
    paths:
      - "apps/backend-relayer/**"
      - "contracts/**"
      - "proof_circuits/**"
      - "scripts/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/backend-relayer-e2e.yml"
  pull_request:
    paths:
      - "apps/backend-relayer/**"
      - "contracts/**"
      - "proof_circuits/**"
      - "scripts/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/backend-relayer-e2e.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  backend-relayer-e2e:
    name: Backend Relayer E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install wasm32v1-none target
        run: rustup target add wasm32v1-none

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Stellar CLI
        run: |
          curl -Ls https://github.com/stellar/stellar-cli/releases/download/v23.3.0/stellar-cli-23.3.0-x86_64-unknown-linux-gnu.tar.gz -o /tmp/stellar-cli.tar.gz
          mkdir -p "$HOME/.local/bin"
          tar -xzf /tmp/stellar-cli.tar.gz -C "$HOME/.local/bin" stellar
          chmod +x "$HOME/.local/bin/stellar"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache cargo directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/stellar/target
          key: ${{ runner.os }}-cargo-relayer-e2e-${{ hashFiles('contracts/stellar/Cargo.lock') }}

      - name: Generate Prisma client
        run: pnpm --filter backend-relayer exec prisma generate

      - name: Run backend-relayer e2e
        run: bash scripts/relayer-e2e/e2e.sh

      - name: Upload relayer logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: relayer-logs
          path: |
            .relayer.log
            .chains.anvil.log
            scripts/relayer-e2e/deployed.json
          if-no-files-found: ignore
