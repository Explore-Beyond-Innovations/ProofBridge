name: Backend Relayer Deploy
on:
  push:
    branches: [ main ]
    paths:
      - "apps/backend-relayer/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/backend-relayer-deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend-relayer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/backend-relayer/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy redeploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
        if: >-
          env.DOKPLOY_URL != '' && env.DOKPLOY_API_KEY != '' &&
          env.DOKPLOY_APPLICATION_ID != ''
        run: |
          echo "Triggering Dokploy redeploy for applicationId=${DOKPLOY_APPLICATION_ID}"
          response=$(curl -fsS -w "\n%{http_code}" -X POST \
            "${DOKPLOY_URL%/}/api/application.deploy" \
            -H "accept: application/json" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${DOKPLOY_APPLICATION_ID}\"}")
          body=$(echo "${response}" | sed '$d')
          status=$(echo "${response}" | tail -n1)
          echo "Dokploy response (${status}): ${body}"
          if [ "${status}" -ge 400 ]; then
            echo "::error::Dokploy returned HTTP ${status}"
            exit 1
          fi
