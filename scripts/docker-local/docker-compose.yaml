# Self-contained local stack for frontend development.
#
#   docker compose -f scripts/docker-local/docker-compose.yaml up --build
#
# Brings up: stellar quickstart + anvil + postgres + one-shot deployer +
# backend-relayer. Relayer is reachable at http://localhost:2005.
#
# For convenience wrappers, see up.sh / down.sh in this directory.

name: proofbridge-local

services:
  stellar:
    image: stellar/quickstart:future
    command: ["--local", "--limits", "unlimited"]
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf -X POST -H ''Content-Type: application/json'' -d ''{"jsonrpc":"2.0","method":"getHealth","id":1}'' http://localhost:8000/soroban/rpc | grep -q ''"status":"healthy"''',
        ]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 30s

  anvil:
    image: ghcr.io/foundry-rs/foundry:stable
    # The foundry image's entrypoint is `sh -c`, so the command is one string.
    entrypoint: ["anvil"]
    command:
      [
        "--host",
        "0.0.0.0",
        "--port",
        "8545",
        "--block-time",
        "2",
        "--chain-id",
        "31337",
      ]
    ports:
      - "9545:8545"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cast block-number --rpc-url http://localhost:8545 >/dev/null 2>&1",
        ]
      interval: 3s
      timeout: 3s
      retries: 40

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: relayer
      POSTGRES_PASSWORD: relayer
      POSTGRES_DB: relayer
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relayer -d relayer"]
      interval: 2s
      timeout: 3s
      retries: 30

  deployer:
    build:
      context: ../..
      dockerfile: scripts/docker-local/Dockerfile.deployer
    depends_on:
      stellar: { condition: service_healthy }
      anvil: { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      ROOT_DIR: /repo
      EVM_RPC_URL: http://anvil:8545
      STELLAR_RPC_URL: http://stellar:8000/soroban/rpc
      STELLAR_NETWORK_PASSPHRASE: "Standalone Network ; February 2017"
      STELLAR_NETWORK: local
      STELLAR_SOURCE_ACCOUNT: admin
      # Foundry's prefunded key #0 — matches start_chains.sh.
      EVM_ADMIN_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      DATABASE_URL: postgresql://relayer:relayer@postgres:5432/relayer
      # Optional dev wallet funding — set in .env or export before `up.sh`.
      # Empty strings are skipped by the fund step.
      DEV_EVM_ADDRESS: ${DEV_EVM_ADDRESS:-}
      DEV_STELLAR_ADDRESS: ${DEV_STELLAR_ADDRESS:-}
    volumes:
      - shared:/shared
      # Contract artifacts are pulled by up.sh from the Proofbridge-Contracts
      # `latest` GitHub Release (or built locally with `up.sh --local`) and
      # extracted
      # into ./.artifacts. deploy.ts reads from these paths verbatim.
      - ./.artifacts/contracts/stellar/target/wasm32v1-none/release:/repo/contracts/stellar/target/wasm32v1-none/release:ro
      - ./.artifacts/contracts/evm/out:/repo/contracts/evm/out:ro
      - ./.artifacts/proof_circuits/deposits/target:/repo/proof_circuits/deposits/target:ro
    restart: "no"

  backend-relayer:
    build:
      context: ../..
      dockerfile: apps/backend-relayer/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      deployer: { condition: service_completed_successfully }
    environment:
      NODE_ENV: production
      PORT: 2005
      DATABASE_URL: postgresql://relayer:relayer@postgres:5432/relayer
      JWT_ACCESS_SECRET: local-access-secret
      JWT_REFRESH_SECRET: local-refresh-secret
      SIGN_DOMAIN: localhost:3000
      SIGN_URI: http://localhost:3000
      ETHEREUM_RPC_URL: http://anvil:8545
      STELLAR_RPC_URL: http://stellar:8000/soroban/rpc
      STELLAR_NETWORK_PASSPHRASE: "Standalone Network ; February 2017"
      STELLAR_AUTH_SECRET: SA3C2KPR5TCHYJ5TNQXAY2776Z3H4CB723GDCAMEX5I2NLWP25QUYB3X
      SECRET_KEY: "0xfdba5a242ddce02cd1d585297aa4afe5aa2831391198746c680a3e16a41676dc"
      EVM_ADMIN_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    # STELLAR_ADMIN_SECRET is generated fresh by the deployer, written to a
    # shared volume, and sourced here so the relayer can sign pre-auths.
    command:
      - "sh"
      - "-c"
      - |
        export STELLAR_ADMIN_SECRET="$(cat /shared/stellar-admin.secret)"
        npx prisma migrate deploy
        exec node dist/src/main.js
    volumes:
      - shared:/shared:ro
    ports:
      - "2005:2005"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:2005/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 10s

volumes:
  shared:
